# OpenClaw Panel - Nginx Reverse Proxy Configuration
# Used by 1Panel's OpenResty/Nginx to proxy /openclaw/ to the panel backend.
#
# Include this in your server block, or copy to /etc/nginx/conf.d/
# and reference it from your main site config.

location /openclaw/ {
    proxy_pass http://127.0.0.1:3187/;
    proxy_http_version 1.1;

    # WebSocket support
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Standard proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Disable buffering for real-time responses
    proxy_buffering off;
    proxy_cache off;

    # SSE (Server-Sent Events) support - long-lived connections
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;

    # Increase buffer sizes for large AI responses
    proxy_buffer_size 16k;
    proxy_buffers 4 32k;
    proxy_busy_buffers_size 64k;
}
